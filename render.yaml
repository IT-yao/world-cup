services:
  - type: web
    name: worldcup-watch-party
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: FOOTBALL_LEAGUE_ID
        value: "1"
      - key: FOOTBALL_SEASON
        value: "2026"
      - key: LIVE_DATA_REFRESH_MINUTES
        value: "15"
      - key: SPORTTERY_ENABLED
        value: "true"
      - key: SPORTTERY_CHANNEL
        value: "c"
      - key: SPORTTERY_POOL_CODE
        value: "had,hhad"
